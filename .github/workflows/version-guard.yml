name: Version Guard

# The version field of cli/package.json is the release trigger: a bump landing
# on main mints a tag, a GitHub release, and production binaries (see
# release.yml). Branch rulesets can only gate whole file paths, not a field
# inside a file — and gating all of cli/package.json would also block every
# legitimate dependency edit — so this check enforces the field-level rule:
# a PR may change the version only when its author is a maintainer.
#
# The job runs on EVERY pull request, with no paths filter, because it is a
# required status check: a path-filtered workflow reports nothing on PRs that
# don't touch the file, which blocks their merge forever. The unchanged-version
# case is the cheap common path.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  version-guard:
    name: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Block version bumps from non-maintainers
        # Context values are passed through env rather than interpolated into
        # the script so untrusted event data can never become shell syntax.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          # The primary authorization signal: a head branch inside this repo
          # can only be created by someone with write access, which this repo
          # grants solely to the maintainers team — and a fork cannot spoof
          # the full_name (nobody else can own inflexa-ai/inflexa). This also
          # covers automation (release-prep pushes its bump branch here).
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          # Fallback for a maintainer releasing from a personal fork.
          # author_association is computed server-side (no extra token
          # scopes), but it surfaces MEMBER only when the author's org
          # membership is PUBLIC — a concealed membership reads as
          # CONTRIBUTOR, which is why it cannot be the primary signal.
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          git fetch --depth=1 origin "$BASE_SHA"
          base_version=$(git show "$BASE_SHA:cli/package.json" | jq -r .version)
          head_version=$(jq -r .version cli/package.json)

          if [ "$base_version" = "$head_version" ]; then
            echo "version unchanged ($head_version) — pass"
            exit 0
          fi

          if [ "$HEAD_REPO" = "$GITHUB_REPOSITORY" ]; then
            echo "version bump $base_version -> $head_version from an in-repo branch by $AUTHOR_LOGIN (write access) — authorized"
            exit 0
          fi

          case "$AUTHOR_ASSOCIATION" in
            OWNER | MEMBER)
              echo "version bump $base_version -> $head_version by $AUTHOR_LOGIN ($AUTHOR_ASSOCIATION, fork PR) — authorized"
              ;;
            *)
              echo "::error::cli/package.json version changed ($base_version -> $head_version), but PR author $AUTHOR_LOGIN ($AUTHOR_ASSOCIATION, fork PR) is not verifiably a maintainer. Version bumps mint production releases and must come from maintainer-authored PRs — split the bump out of this PR, or open it from an in-repo branch."
              exit 1
              ;;
          esac
