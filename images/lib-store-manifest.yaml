    - xcms
    - CAMERA
    - DEP
    - MSstats
    - MSstatsTMT

    # Multi-omics
    - mixOmics
    - CARNIVAL

    # Microbiome
    - ANCOMBC
    - ALDEx2
    - Maaslin2
    - phyloseq
    - mia
    - miaViz

  github:
    # Cell type deconvolution
    - AlmogAngel/xCell2

    # Immune deconvolution
    - omnideconv/immunedeconv

    # CyTOF batch correction
    - saeyslab/CytoNorm
    - biosurf/cyCombine

    # PK/PD simulation
    - InsightRX/PKPDsim

    # Mendelian randomization
    - MRCIEU/TwoSampleMR

    # Spatial deconvolution
