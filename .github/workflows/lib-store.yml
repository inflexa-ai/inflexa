name: Build Sandbox Images

# Builds the three layered sandbox images (sandbox-base → sandbox-python →
# sandbox-python-r) from images/*/Dockerfile + images/lib-store-manifest.yaml and
# publishes them to GitHub Packages (GHCR) as multi-arch manifests. It then
# extracts per-track tarballs OUT of the published images and publishes the
# content-addressed managed-mount artifacts to S3 — one build, two consumers:
#
#   * OSS user: `docker run ghcr.io/inflexa-ai/inf-cli/sandbox-python-r` — the
#     store is baked, zero pull, zero mount. Or `FROM` it and add libs.
#   * Managed: mounts the extracted tarballs read-only at /mnt/libs (cold-start
#     friendly), unchanged from before — only the tarball SOURCE moved (an image
#     subtree, not a throwaway builder).
#
# amd64 needs a large self-hosted runner (label `inflexa-builder`) — the full R +
# Bioconductor compile does not fit a GitHub-hosted runner. arm64 builds on the
# hosted arm64 runner. Both arches attempt every image best-effort;
# sandbox-python-r is continue-on-error (arm64 R source compiles are patchy), so
# an arch that cannot build R still publishes base + python and the non-R tracks.
#
# The build-time LOAD CHECK runs inside each image build (best-effort + non-empty
# floor). The COVERAGE REPORT runs after extraction (want-vs-got + regression diff
# vs the last published manifest: an amd64 regression fails, an arm64 miss is
# informational). Tarball publish is candidate-only; latest/<arch> advances only
# after acceptance goes green — see .github/workflows/lib-store-acceptance.yml.
#
# GHCR push uses the workflow GITHUB_TOKEN (packages: write). S3 publish is OPT-IN
# via repo/org configuration; without it the images still publish but the S3
# upload is skipped:
#   - vars.LIB_STORE_S3_BUCKET        target bucket
#   - vars.LIB_STORE_PUBLISH_ROLE_ARN OIDC role to assume for the upload
#   - vars.AWS_REGION                 optional; defaults to us-east-1

on:
  push:
    branches: [main]
    paths:
      - images/lib-store-manifest.yaml
      - images/sandbox-base/**
      - images/sandbox-python/**
      - images/sandbox-python-r/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

env:
  BUILDER_NAME: sandbox-image-builder
  MANIFEST: images/lib-store-manifest.yaml
  IMAGE_BASE: ghcr.io/${{ github.repository }}/sandbox-base
  IMAGE_PYTHON: ghcr.io/${{ github.repository }}/sandbox-python
  IMAGE_PYTHON_R: ghcr.io/${{ github.repository }}/sandbox-python-r

jobs:
  # A single coherent version + shared manifest metadata for every arch.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      base_image: ${{ steps.meta.outputs.base_image }}
      r_version: ${{ steps.meta.outputs.r_version }}
      python_version: ${{ steps.meta.outputs.python_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute version + parse manifest
        id: meta
        run: |
          BASE_IMAGE=$(grep '^base_image:' "$MANIFEST" | awk '{print $2}' | tr -d '"')
          R_VERSION=$(grep '^r_version:' "$MANIFEST" | awk '{print $2}' | tr -d '"')
          PYTHON_VERSION=$(grep '^python_version:' "$MANIFEST" | awk '{print $2}' | tr -d '"')
          VERSION=$(date +%Y%m%d)-$(echo "${{ github.sha }}" | head -c 7)
          {
            echo "version=$VERSION"
            echo "base_image=$BASE_IMAGE"
            echo "r_version=$R_VERSION"
            echo "python_version=$PYTHON_VERSION"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: '["self-hosted", "inflexa-builder"]'
          - arch: arm64
            platform: linux/arm64
            runner: '"ubuntu-24.04-arm"'
    runs-on: ${{ fromJSON(matrix.runner) }}
    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}
      VERSION: ${{ needs.prepare.outputs.version }}
      BASE_IMAGE: ${{ needs.prepare.outputs.base_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: ${{ env.BUILDER_NAME }}
          cleanup: false

      - name: Free disk space (hosted arm64 runner)
        if: matrix.arch == 'arm64'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          df -h /

      - name: Recover stale builder state
        if: matrix.arch == 'amd64'
        # cleanup:false reuses the BuildKit container across runs on the
        # persistent self-hosted builder. A cancelled prior run can leave orphaned
        # sub-container network state behind — every subsequent build then sees
        # "Connection refused" against public mirrors. Probe egress; recreate the
        # builder only if broken.
        run: |
          set -eu
          PROBE=$(mktemp -d) && trap 'rm -rf "$PROBE"' EXIT
          cat > "$PROBE/Dockerfile" <<'EOF'
          FROM alpine:3
          RUN wget -q --spider --timeout=15 http://archive.ubuntu.com/ubuntu/dists/noble/InRelease
          EOF
          if ! docker buildx build --builder "$BUILDER_NAME" --platform "$PLATFORM" --no-cache "$PROBE" >/tmp/probe.log 2>&1; then
            echo "::warning::Builder $BUILDER_NAME failed egress probe; recreating to clear stale state"
            sed 's/^/probe: /' /tmp/probe.log || true
            docker buildx rm --force "$BUILDER_NAME" || true
            docker buildx create --driver docker-container --name "$BUILDER_NAME" --bootstrap >/dev/null
          fi

      - name: Ensure zstd
        run: command -v zstd >/dev/null || sudo apt-get install -y -qq zstd

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Layered build: base → python → python-r, each on this arch, tagged
      # <image>:<version>-<arch>. `--load` puts each image in the local docker
      # daemon so the tarball extraction below can `docker run` it without a
      # pull-back; `docker push` then publishes it to GHCR.

      - name: "Build + push: sandbox-base"
        run: |
          docker buildx build --load \
            -f images/sandbox-base/Dockerfile \
            --platform "$PLATFORM" \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --builder "$BUILDER_NAME" \
            -t "${IMAGE_BASE}:${VERSION}-${ARCH}" \
            .
          docker push "${IMAGE_BASE}:${VERSION}-${ARCH}"

      - name: "Build + push: sandbox-python"
        run: |
          docker buildx build --load \
            -f images/sandbox-python/Dockerfile \
            --platform "$PLATFORM" \
            --build-arg "SANDBOX_BASE_IMAGE=${IMAGE_BASE}:${VERSION}-${ARCH}" \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --builder "$BUILDER_NAME" \
            -t "${IMAGE_PYTHON}:${VERSION}-${ARCH}" \
            .
          docker push "${IMAGE_PYTHON}:${VERSION}-${ARCH}"

      - name: "Build + push: sandbox-python-r"
        id: python_r
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker buildx build --load \
            -f images/sandbox-python-r/Dockerfile \
            --platform "$PLATFORM" \
            --build-arg "SANDBOX_PYTHON_IMAGE=${IMAGE_PYTHON}:${VERSION}-${ARCH}" \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --secret id=github_token,env=GITHUB_TOKEN \
            --builder "$BUILDER_NAME" \
            -t "${IMAGE_PYTHON_R}:${VERSION}-${ARCH}" \
            .
          docker push "${IMAGE_PYTHON_R}:${VERSION}-${ARCH}"

      # Extract the per-track tarballs from the HIGHEST image that built for this
      # arch: sandbox-python-r carries all tracks; if R did not build, fall back
      # to sandbox-python (python/conda/node only).
      - name: Extract per-track tarballs from the image
        id: extract
        run: |
          if [ "${{ steps.python_r.outcome }}" = "success" ]; then
            TOP="${IMAGE_PYTHON_R}:${VERSION}-${ARCH}"
          else
            echo "::warning::sandbox-python-r did not build for $ARCH — extracting non-R tracks from sandbox-python"
            TOP="${IMAGE_PYTHON}:${VERSION}-${ARCH}"
          fi
          echo "top_image=$TOP" >> "$GITHUB_OUTPUT"
          bash scripts/lib-store-extract-tarballs.sh "$TOP" staging

      - name: Coverage report (want vs loaded, regression diff)
        id: coverage
        env:
          S3_BUCKET: ${{ vars.LIB_STORE_S3_BUCKET }}
        run: |
          # Best-effort baseline: the last published coverage for this arch, if any.
          PREV_ARG=()
          if [ -n "$S3_BUCKET" ] && aws s3 cp "s3://$S3_BUCKET/latest/linux-${ARCH}/coverage.json" prev-coverage.json 2>/dev/null; then
            PREV_ARG=(--previous prev-coverage.json)
          fi
          mkdir -p dist
          # amd64 regression → non-zero → fails the job (no publish). arm64 miss is
          # informational. The table is written to the step summary either way.
          python3 scripts/lib-store-coverage.py \
            --arch "$ARCH" --manifest "$MANIFEST" --store staging \
            --out dist/coverage.json "${PREV_ARG[@]}" | tee coverage.out
          cat coverage.out >> "$GITHUB_STEP_SUMMARY"

      - name: Pack per-track tarballs
        id: pack
        run: |
          bash scripts/lib-store-pack.sh staging dist
          {
            echo "## Image build ($ARCH)"
            echo "| Image | Result |"
            echo "|-|-|"
            echo "| sandbox-base | pushed |"
            echo "| sandbox-python | pushed |"
            echo "| sandbox-python-r | ${{ steps.python_r.outcome }} |"
            echo "Extracted from: ${{ steps.extract.outputs.top_image }}"
            echo "Packed tracks: $(tr '\n' ' ' < dist/tracks.txt)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish configuration
        id: publish
        run: |
          if [ -n "${{ vars.LIB_STORE_S3_BUCKET }}" ] && [ -n "${{ vars.LIB_STORE_PUBLISH_ROLE_ARN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::S3 publish skipped — set repo variables LIB_STORE_S3_BUCKET and LIB_STORE_PUBLISH_ROLE_ARN to enable the tarball upload. The images were still pushed to GHCR."
          fi

      - name: Configure AWS credentials
        if: steps.publish.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.LIB_STORE_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Publish track tarballs + candidate manifest + coverage
        if: steps.publish.outputs.enabled == 'true'
        env:
          S3_BUCKET: ${{ vars.LIB_STORE_S3_BUCKET }}
          PUBLIC_URL: ${{ vars.LIB_STORE_PUBLIC_URL || 'https://lib-store.inflexa.ai' }}
          R_VERSION: ${{ needs.prepare.outputs.r_version }}
          PYTHON_VERSION: ${{ needs.prepare.outputs.python_version }}
          GIT_SHA: ${{ github.sha }}
        run: |
          scripts/lib-store-publish.sh "$ARCH" "$VERSION" dist
          # The coverage baseline travels with the immutable version so the next
          # build's regression diff has a per-arch reference point.
          aws s3 cp dist/coverage.json "s3://$S3_BUCKET/$VERSION/linux-${ARCH}/coverage.json"

      - name: Record candidate metadata
        run: |
          mkdir -p candidate
          cat > "candidate/linux-${ARCH}.json" <<EOF
          {"version":"${VERSION}","arch":"linux-${ARCH}","publish":"${{ steps.publish.outputs.enabled }}","image":"${{ steps.extract.outputs.top_image }}"}
          EOF
          cat "candidate/linux-${ARCH}.json"

      - name: Upload candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-store-candidate-${{ matrix.arch }}
          path: candidate/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker rmi "${IMAGE_BASE}:${VERSION}-${ARCH}" "${IMAGE_PYTHON}:${VERSION}-${ARCH}" "${IMAGE_PYTHON_R}:${VERSION}-${ARCH}" 2>/dev/null || true
          rm -rf staging dist candidate
          docker image prune -f 2>/dev/null || true
          docker container prune -f 2>/dev/null || true

  # Combine the per-arch image tags into multi-arch manifest lists so
  # `docker pull` resolves the host arch automatically. Only the arch tags that
  # actually built are included (e.g. sandbox-python-r may be amd64-only).
  manifest:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          set -eu
          combine() {
            local image="$1"; shift
            local srcs=()
            for a in amd64 arm64; do
              tag="${image}:${VERSION}-${a}"
              if docker buildx imagetools inspect "$tag" >/dev/null 2>&1; then srcs+=("$tag"); fi
            done
            if [ "${#srcs[@]}" -eq 0 ]; then
              echo "::warning::no arch tags for $image — skipping manifest"
              return 0
            fi
            docker buildx imagetools create -t "${image}:${VERSION}" -t "${image}:latest" "${srcs[@]}"
            echo "published ${image}:latest (${srcs[*]})"
          }
          combine "${IMAGE_BASE}"
          combine "${IMAGE_PYTHON}"
          combine "${IMAGE_PYTHON_R}"
