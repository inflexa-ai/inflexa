# lib-store-manifest.yaml
r_version: "4.6.0"
python_version: "3.12"
# Digest-pinned so CI's `--build-arg BASE_IMAGE` and the Dockerfile default resolve the same
# immutable image, closing the supply-chain gap of building the published image off a movable tag.
# The @sha256 must be refreshed whenever the r_version tag advances — Dependabot's docker updater
# tracks the Dockerfiles, not this manifest.
base_image: "rocker/r-ver:4.6.0@sha256:6f05a1a8b8c52328f181593923909b01cbfd14c9caea93bf75ddc65e806d8eac"

r:
    cran:
        # Core data science / infrastructure
        - data.table
        - jsonlite
        - httr2
        - yaml
        - cli
        - glue
        - fs
        - rlang

        # Statistics / modeling
        - survival
        - lme4
        - glmnet
        - nlme
        - mgcv
        - minpack.lm
        - quadprog
        - Rfast
        - ashr # DESeq2 lfcShrink(type="ashr") — the contrast= capable shrinkage
          # backend (apeglm only accepts coef=). Same Suggests gap as apeglm;
          # CRAN-only, which is why the pair is split across two tracks.

        # Visualization
        - ggplot2
        - plotly
        - pheatmap
        - corrplot
        - patchwork
        - cowplot
        - reshape2
        - ComplexUpset

        # Omics helpers / general multivariate analysis
        - remotes
        - optparse
        - matrixStats
        - Rcpp
        - RcppArmadillo
        - BiocManager
        - devtools
        - ggrepel
        - pROC
        - vegan
        - babelgene
        - msigdbr
        - tibble
        - dplyr
        - tidyr
        - readr
        - purrr
        - stringr
        - igraph
        - openxlsx2
        - ontologyIndex

        # Transitive CRAN deps needed by Bioconductor packages. Listing them
        # explicitly ensures r-cran-* debs are installed in the CRAN stage and
        # end up in /staging/r/cran/ (BiocManager would otherwise pull them
        # via bspm+apt during the BIOC stage, where they land in
        # /usr/lib/R/site-library/ and never make it into the tarball).
        - DBI # AnnotationDbi, RSQLite
        - RSQLite # AnnotationDbi, ensembldb
        - XML # biomaRt, many BioC
        - CVXR # ANCOMBC
        - DescTools # ANCOMBC
        - energy # ANCOMBC
        - emdbook # apeglm Imports it — needed at RUNTIME, so it has to be staged
          # here rather than picked up mid-BIOC-stage
        - RcppEigen # apeglm LinkingTo
        - RcppNumerical # apeglm LinkingTo. Bioconductor has no Linux binaries, so
          # apeglm compiles from source and needs both header packages present
          # before the BIOC stage runs.
        - RcppParallel # dada2 Imports it, and dada2's C++ needs its headers to compile
        - hwriter # ShortRead (dada2 dep)
        - latticeExtra # ShortRead (dada2 dep)
        - rjags # infercnv Imports rjags; rjags's .onLoad dlopens libjags.so.
          # Listing here pulls r-cran-rjags via r2u, which apt-installs
          # libjags4 into the build container so the install-time load test
          # passes. (Runtime libjags is provided by `jags` in sandbox-base.)
        - otelsdk # Bioc 3.22+ instrumentation: imported by AnnotationDbi,
          # biomaRt, ensembldb, sva, GSVA, singscore, WGCNA,
          # minfi, VariantAnnotation, ANCOMBC, Maaslin2, etc.
          # r-cran-otel (API) is pulled in automatically; r-cran-otelsdk
          # (runtime/exporter) must be listed or load-time fails.

        # Translational medicine / biomarker analysis
        - survminer # Publication-ready survival plots, cutpoint optimization
        - OptimalCutpoints # Cutpoint optimization methods
        - timeROC # Time-dependent ROC for survival biomarkers

        # PK/PD simulation and population modeling
        - mrgsolve # ODE-based PK/PD simulation (depends on Rcpp, RcppArmadillo)
        - nlmixr2 # Nonlinear mixed-effects population PK/PD modeling
        - pksensi # Global sensitivity analysis for PK models

        # Mendelian randomization
        - MendelianRandomization # MR analysis methods (IVW, Egger, weighted median)

        # Single-cell — Seurat ecosystem (required by Azimuth, ProjecTILs, copykat)
        - Seurat
        - SeuratObject
        - SoupX # Ambient RNA removal, the other half of the pair the single-cell
          # pack names beside CellBender. Its whole Seurat surface is one import
          # (Read10X); the algorithm runs on plain Matrix objects, so a Seurat
          # major bump is unlikely to reach it. Every other dep is already here
          # because Seurat is.

        # Targeted proteomics panels — both are named by
        # skills/proteomics/references/olink-somascan-api.md, which calls
        # importr() on them, so their absence broke a documented entry point
        # rather than merely narrowing one.
        - OlinkAnalyze # The costly one: hard-Imports arrow and duckdb, which are
          # the Explore-HT parquet reader, not optional extras. ~108 MB of the
          # ~187 MB this group adds. Ships its own example data; no network.
        - SomaDataIO # Reads SomaScan .adat. Pure R, ~5 MB, everything else it
          # needs is already present.

        # Surrogate variable analysis for methylation
        - SmartSVA # Unmaintained since 2017 and it calls an UNEXPORTED sva
          # internal, getFromNamespace("mono", "sva"), at package top level.
          # `mono` is present in the sva 3.60.0 that Bioc 3.23 ships, so this
          # works today; if sva ever drops it, `library(SmartSVA)` fails at load
          # and the load check reports a DROP rather than letting it fail inside
          # an analysis. Export is `smartsva.cpp` — plain `smartsva` is commented
          # out of the NAMESPACE. Note it Depends on sva, so on the amd64 r2u
          # path sva is pulled into the CRAN stage as well as the Bioc one; the
          # two resolve to the same version today.

    bioconductor:
        # Core Bioconductor infrastructure
        - BiocGenerics
        - S4Vectors
        - KEGGREST # AnnotationDbi transitive dep
        - IRanges
        - BiocParallel
        - GenomicRanges
        - SummarizedExperiment
        - DelayedArray
        - HDF5Array

        # Annotation
        - AnnotationHub
        - AnnotationDbi
        - org.Hs.eg.db
        - org.Mm.eg.db
        - org.Rn.eg.db
        - org.Dr.eg.db
        - org.Cf.eg.db
        - org.Bt.eg.db
        - ensembldb
        - EnsDb.Hsapiens.v86
        - EnsDb.Mmusculus.v79
        - biomaRt

        # Differential expression
        - DESeq2
        - apeglm # DESeq2 lfcShrink(type="apeglm") — the default shrinkage
          # estimator and the one skills/bulk-transcriptomics prescribes. DESeq2
          # only Suggests it, so nothing pulls it transitively and every
          # lfcShrink() call errors without it. Bioconductor-only (no CRAN
          # mirror); its CRAN-side deps are listed in the transitive block above.
          # The CRAN half of the pair is `ashr`.
        - edgeR
        - limma
        - sva
        - variancePartition

        # Pathway / enrichment
        - GSVA
        - fgsea
        - clusterProfiler
        - EnhancedVolcano
        - singscore
        - rrvgo

        # Network
        - WGCNA

        # Single-cell
        - SingleCellExperiment
        - scater
        - scran
        - batchelor
        - zellkonverter
        - ComplexHeatmap

        # Single-cell additions for tumor-immune analyses
        - infercnv
        - glmGamPoi
        # UCell: scGate dep. Pre-install from Bioc to avoid pulling it via
        # bioconductor.org during the github stage (which has no retry on its own
        # transitive deps).
        - UCell

        # Spatial
        - BayesSpace

        # CyTOF / mass cytometry
        - flowCore
        - CATALYST
        - FlowSOM
        - ConsensusClusterPlus
        - diffcyt

        # Microarray
        - oligo
        - affy

        # Methylation
        - minfi
        - ChAMP
        - DMRcate
        - missMethyl
        - EpiDISH
        - dmrseq
        - DSS

        # Genomics
        - DiffBind
        - rtracklayer
        - Rsamtools
        - Biostrings
        - GenomicAlignments
        - VariantAnnotation

        # Methylation clock
        - methylclock

        # Proteomics / metabolomics
        - MSnbase
        - Spectra
        - xcms
        - CAMERA
        - DEP
        - MSstats
        - MSstatsTMT

        # Multi-omics
        - mixOmics
        - CARNIVAL
        - cosmosR # BIOCONDUCTOR-ONLY, and this placement is load-bearing: CRAN
          # carries a DIFFERENT cosmosR (v1.0, archived 2016, Depends xlsx and so
          # pulls Java). Moving this to the cran: list does not just fetch the
          # wrong package — no r-cran-cosmosr deb exists, and the amd64 apt step
          # is transactional, so one unresolvable name installs nothing, leaves
          # r/cran empty, and trips the non-empty floor. Its prior-knowledge
          # network ships in-package (meta_network, ~117k interactions), so
          # unlike most methods of its kind it needs no download. Pulls dorothea
          # and bcellViper, which are ExperimentData packages — a Bioc repo class
          # nothing else here draws from.

        # Microbiome
        - dada2 # The 16S/ITS ENTRY POINT: raw demultiplexed FASTQ -> ASV table.
          # Everything else in this section is downstream — it consumes an
          # abundance table and cannot produce one. Without dada2 the amplicon
          # pack could only be entered with a pre-computed feature table, so a
          # user arriving with raw reads had nowhere to start.
        - ShortRead # dada2's FASTQ I/O layer. Listed rather than left transitive
          # so a break in it surfaces under its own name in the load check
          # instead of as an opaque dada2 failure.
        - ANCOMBC
        - ALDEx2
        - Maaslin2
        - phyloseq
        - mia
        - miaViz

    github:
        # Cell type deconvolution
        - AlmogAngel/xCell2

        # Immune deconvolution
        - omnideconv/immunedeconv

        # CyTOF batch correction
        - saeyslab/CytoNorm
        - biosurf/cyCombine

        # PK/PD simulation
        - InsightRX/PKPDsim

        # Mendelian randomization
        - MRCIEU/TwoSampleMR

        # Spatial deconvolution
        - dmcable/spacexr

        # Tumor-immune label transfer + classifier substrates
        # Pin Signac to 1.16.0 — 1.17.0 removed RunChromVAR (chromVAR dropped from
        # Bioc 3.23), but Azimuth's NAMESPACE still imports it
        # (satijalab/azimuth#291, unfixed upstream).
        - stuart-lab/signac@1.16.0
        - satijalab/azimuth
        - mojaveazure/seurat-disk
        - carmonalab/scGate
        - carmonalab/STACAS
        - carmonalab/ProjecTILs

        # Malignant cell calling
        - navinlabcode/copykat # Expression-only: aneuploid vs diploid from a
          # genes x cells UMI matrix, no external inputs. infercnv is the other
          # expression-based route.
        - kharchenkolab/numbat # Haplotype-aware, so unlike the two above it is
          # NOT self-sufficient: its preprocessing shells out to cellsnp-lite and
          # eagle2 (both in system_tools, eagle2 amd64-only) and reads a phasing
          # panel, a common-SNP site list and a recombination map from the
          # reference store — the `variant-phasing` group in the harness catalog.
          # All three are opt-in downloads, so a default install has the package
          # but not the data, and the run stops at the pileup step. That is the
          # intended shape: the planner is told to ask for a missing load-bearing
          # reference rather than plan around it, and these entries are what make
          # that request answerable. What numbat buys over copykat is tolerance of
          # hyper- and hypodiploid genomes, where a median-ploidy baseline misleads.

python:
    pip:
        common:
            # Core scientific / storage layer
            - numpy
            - pandas
            - scipy
            # Pin JAX <0.10: JAX 0.10.0 removed xla_pmap_p from jax.extend.core.primitives
            # but numpyro (pertpy transitive dep) still imports it as of 0.20.1.
            - "jax<0.10"
            - pydantic
            - pyyaml
            - pyarrow
            - h5py
            - zarr
            - "dask[array,dataframe]"
            - fsspec
            - joblib
            - rpy2
            # Floor grpcio-tools: orbax-checkpoint (transitive via pertpy → flax) is otherwise
            # resolved to grpcio-tools 1.30.0, whose setup.py imports the now-unavailable
            # pkg_resources and fails to build under modern setuptools.
            - "grpcio-tools>=1.60"

            # Visualization
            - matplotlib
            - seaborn
            - plotly
            - kaleido # Resolves to 1.x, which no longer embeds a browser — it drives
              # one over CDP instead. fig.write_image() therefore depends on the
              # chromium staged in images/sandbox-base/Dockerfile (same arrangement
              # as rjags above needing `jags` there). Pinning back to <1.0 would
              # re-embed the browser but strands us on an unmaintained release.
            - nbformat
            - Pillow
            - upsetplot

            # ML / statistics
            - scikit-learn
            - "statsmodels>=0.14.5"
            - formulaic
            - pingouin
            - lifelines
            - scikit-survival
            - scikit-posthocs
            - xgboost
            - shap
            - optuna
            - networkx
            - PyWGCNA

            # Single-cell
            - anndata
            - mudata
            - scanpy
            - scvi-tools
            - muon
            - "decoupler[full]>=2.1.2"
            - "pydeseq2>=0.5.3"
            - "gseapy>=1.1.11"
            - leidenalg
            - louvain
            - umap-learn
            - scikit-misc
            - pertpy
            - palantir
            - scvelo
            - harmonypy
            - scanorama # The third integration route the single-cell pack names
              # beside harmony and scVI. Pure Python; its annoy and fbpca deps
              # publish no cp312 wheels and compile from source, which the
              # builder stage already does for louvain.
            - celltypist
            - symphonypy
            - pyscenic # INERT WITHOUT REFERENCE DATA. GRNBoost2 runs on the
              # counts alone, but the cisTarget pruning step that makes a regulon
              # a regulon needs ranking databases and a motif-to-TF table, which
              # are opt-in downloads (`regulon-motifs` in the harness catalog),
              # not part of this image. Skipping the pruning leaves raw
              # co-expression, which is not what pySCENIC is for.
            - "cellrank>=2"
            - cell2location
            - rpds-py
            - scglue

            # Spatial
            - spatialdata
            - spatialdata-io
            - spatialdata-plot
            - squidpy
            - xarray
            - shapely
            - geopandas
            - rasterio
            # Spatial autocorrelation (Moran's I, Getis-Ord G), which the
            # spatial pack names as PySAL. Deliberately the two libraries that
            # provide it rather than the `pysal` umbrella: the umbrella is 23
            # packages and 74 MB, and most of what it adds is not spatial
            # statistics — regionalisation, network analysis, GWR, an LP solver.
            # These two are 13 MB because geopandas and shapely are already here.
            - libpysal
            - esda

            # Genomics
            - biopython
            - cyvcf2
            - pyfaidx
            - pyranges
            - pybedtools
            - pyBigWig

            # Immune / flow / mass-spec
            - scirpy # Also the TCR/BCR repertoire track. immunarch is NOT the
              # counterpart to add here: it is an R/CRAN package, and the PyPI
              # name is a 0.0.1.dev0 reservation by the same author whose
              # modules are literally zero bytes. It installs and imports
              # cleanly, so the load check passes it and packages.txt then
              # advertises a capability that does not exist — which is why it
              # sat here undetected. Repertoire work goes through scirpy.
            - pytometry
            - pyteomics
            - pymzml
            - matchms
            # Floor spectrum-utils: unconstrained, the resolver selects 0.4.2, which
            # requires numba 0.53.1 — whose setup.py hard-rejects Python >=3.10 and so
            # fails to build on the py3.12 base (both arches). 0.5.0 needs numba >=0.60,
            # which ships py3.12 wheels.
            - "spectrum-utils>=0.5"
            - ms-deisotope

            # Microbiome
            - scikit-bio
            - biom-format

            # 3D genomics
            - cooler
            - cooltools
            - bioframe

            # Cheminformatics
            - rdkit
            - datamol
            # mordredcommunity, not mordred: upstream mordred 1.2.0 is unmaintained and
            # still calls `np.float`, removed in NumPy 1.24, so importing it fails on any
            # current NumPy. The community fork carries the same `mordred` module name,
            # so imports are unchanged.
            - mordredcommunity
            - deepchem[jax]

            # Reporting / export
            - weasyprint
            - Jinja2
            - python-pptx
            - orjson
            - conorm
            - matplotlib-venn
            - adjustText
            - openpyxl

            # Tools
            - jupytext
            - pypdf
            - python-docx

            # Multi-omics integration (ensures MOFA+ works)
            - mofapy2
            - snfpy

            # Pharmacokinetics
            - pharmpy-core # Population PK modeling utilities

        # liana is arch-split: amd64 installs liana[extras] (the extras pull
        # pyscipopt/SCIP, which has no arm64 build); arm64 installs core liana.
        # The builder installs common + the target arch and strips nothing itself.
        #
        # snapatac2 is amd64-only: PyPI ships manylinux x86_64 wheels but no
        # linux-aarch64 wheel for any version (only macOS arm64), so on the arm64
        # build uv falls back to compiling its Rust extension from sdist, which
        # fails under maturin. Same treatment as the arm64-unavailable bioconda tools.
        amd64:
            - "liana[extras]"
            - "snapatac2>=2.7"
        arm64:
            - "liana"

# Node packages installed into the store's node subtree (a flat list, not
# arch-split). echarts backs the chart/report rendering path.
node:
    - echarts

# Build-time dependencies (compilers, -dev headers) are in the builder stages of
# images/sandbox-python/Dockerfile and images/sandbox-python-r/Dockerfile (not
# listed here). Runtime system libraries are in images/sandbox-base/Dockerfile
# (not listed here).
#
# This manifest is the single package-set source of truth consumed by the layered
# image builds: it only lists the R, Python, Node packages and bioinformatics
# tools that go on the shared library store at /mnt/libs/current.

# Bioinformatics CLI tools from bioconda. `common` builds on every arch;
# `amd64` holds tools with no linux-aarch64 bioconda package (the arm64 conda
# solve fails on a missing package), so they are amd64-only — the same
# treatment R gets upstream. The builder installs common + the target arch.
system_tools:
    common:
        # samtools and bcftools are PINNED because cellsnp-lite below caps htslib,
        # and it caps it differently per arch: no cellsnp-lite build accepts htslib
        # >= 1.24, and the aarch64 build stops at < 1.23 where linux-64 reaches
        # < 1.24. One micromamba solve resolves htslib once, so leaving these
        # unpinned does not fail — it silently walks samtools back to a different
        # version on each arch. 1.22.1/1.22 is the highest pair satisfying both, so
        # the two arches ship identical versions rather than diverging quietly.
        - samtools=1.22.1
        - bcftools=1.22
        - tabix
        - bedtools
        - vcftools
        - mageck # CRISPR screen analysis (MAGeCK)
        - cellsnp-lite # Allele pileup at common SNP sites — the first half of
          # haplotype-aware single-cell CNV calling, whose phasing half is eagle2
          # below. Apache-2.0, self-contained, and built for both arches.
    amd64:
        - plink2 # no linux-aarch64 bioconda build
        - eagle2 # no linux-aarch64 bioconda build (linux-64 + osx-64 only), so
          # haplotype-aware CNV calling is amd64-only. Building it for aarch64
          # means compiling the GPLv3 source against htslib/boost/openblas in a
          # builder stage — a stage, not a manifest line. Its executable is named
          # `eagle`, not `eagle2`; see `binaries` below.

    # Conda package name -> the executable it installs, for the packages where the
    # two differ. Everything else is probed under its own name. This exists because
    # the install step needs the PACKAGE name while the load check and the coverage
    # report need the BINARY name: eagle2 installs `bin/eagle`, so probing it as
    # `eagle2` would drop a tool that is present and working out of packages.txt,
    # and packages.txt is the only thing that tells an agent the tool exists.
    binaries:
        eagle2: eagle
