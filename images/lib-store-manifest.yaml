    # Single-cell
    - SingleCellExperiment
    - scater
    - scran
    - batchelor
    - zellkonverter
    - ComplexHeatmap

    # Single-cell additions for tumor-immune analyses
    - infercnv
    - glmGamPoi
    # UCell: scGate dep. Pre-install from Bioc to avoid pulling it via
    # bioconductor.org during the github stage (which has no retry on its own
    # transitive deps).
    - UCell

    # Spatial
    - BayesSpace

    # CyTOF / mass cytometry
    - flowCore
    - CATALYST
    - FlowSOM
    - ConsensusClusterPlus
    - diffcyt

    # Microarray
    - oligo
    - affy

    # Methylation
    - minfi
    - ChAMP
    - DMRcate
    - missMethyl
    - EpiDISH
    - dmrseq
