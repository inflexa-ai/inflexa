name: Version Guard

# The version fields of cli/package.json and harness/package.json are release
# triggers: a cli bump landing on main mints a tag, a GitHub release, and
# production binaries (release.yml); a harness bump publishes
# @inflexa-ai/harness to npm (release-harness.yml). Branch rulesets can only
# gate whole file paths, not a field inside a file — and gating the whole
# manifests would also block every legitimate dependency edit — so this check
# enforces the field-level rule: a PR may change a version only when its
# author is a maintainer.
#
# The job runs on EVERY pull request, with no paths filter, because it is a
# required status check: a path-filtered workflow reports nothing on PRs that
# don't touch the file, which blocks their merge forever. The unchanged-version
# case is the cheap common path.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  version-guard:
    name: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Block version bumps from non-maintainers
        # Context values are passed through env rather than interpolated into
        # the script so untrusted event data can never become shell syntax.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          # The primary authorization signal: a head branch inside this repo
          # can only be created by someone with write access, which this repo
          # grants solely to the maintainers team — and a fork cannot spoof
          # the full_name (nobody else can own inflexa-ai/inflexa). This also
          # covers automation (release-prep pushes its bump branch here).
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          # Fallback for a maintainer releasing from a personal fork.
          # author_association is computed server-side (no extra token
          # scopes), but it surfaces MEMBER only when the author's org
          # membership is PUBLIC — a concealed membership reads as
          # CONTRIBUTOR, which is why it cannot be the primary signal.
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          git fetch --depth=1 origin "$BASE_SHA"

          bumps=""
          for pkg in cli/package.json harness/package.json; do
            base_version=$(git show "$BASE_SHA:$pkg" | jq -r .version)
            head_version=$(jq -r .version "$pkg")
            if [ "$base_version" != "$head_version" ]; then
              bumps="$bumps $pkg:$base_version->$head_version"
            fi
          done

          if [ -z "$bumps" ]; then
            echo "no release-trigger version changed — pass"
            exit 0
          fi

          if [ "$HEAD_REPO" = "$GITHUB_REPOSITORY" ]; then
            echo "version bump$bumps from an in-repo branch by $AUTHOR_LOGIN (write access) — authorized"
            exit 0
          fi

          case "$AUTHOR_ASSOCIATION" in
            OWNER | MEMBER)
              echo "version bump$bumps by $AUTHOR_LOGIN ($AUTHOR_ASSOCIATION, fork PR) — authorized"
              ;;
            *)
              echo "::error::a release-trigger version changed ($bumps), but PR author $AUTHOR_LOGIN ($AUTHOR_ASSOCIATION, fork PR) is not verifiably a maintainer. Version bumps mint production releases and must come from maintainer-authored PRs — split the bump out of this PR, or open it from an in-repo branch."
              exit 1
              ;;
          esac

      # CITATION.cff restates cli/package.json's version as citation metadata,
      # and it is what GitHub's "Cite this repository" button renders — so a
      # stale value ships as a wrong citation rather than as a broken build,
      # which no other check would catch. Zenodo archives this file off the tag
      # too, but derives its own record version from the tag name and ignores
      # the version key, so this guard serves the GitHub citation box and human
      # readers, not the DOI.
      #
      # The check FAILS only when this PR set CITATION.cff's version line to a
      # value that disagrees with the PR's own cli version — the one drift a
      # PR author must fix in place. Everything else is citation-sync.yml's
      # job, not the PR's: a bump PR that leaves CITATION.cff untouched is
      # healed on main right after it merges (that is the point — nobody has
      # to remember the file), and drift merely inherited from the base
      # branch must not turn unrelated PRs red — a required check that fails
      # for pre-existing state teaches people to merge past red, which costs
      # more than the drift. Both lenient paths still surface a ::notice so
      # the drift is visible while it lasts.
      - name: Check CITATION.cff is in step with cli/package.json
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE_SHA"
          head_cli=$(jq -r .version cli/package.json)
          # Top-level-key parse, same shape as sync.sh: the ^ anchor keeps
          # `version:` from also matching `cff-version:`.
          head_cff=$(sed -nE 's/^version: (.*)$/\1/p' CITATION.cff)
          # A base without the file reads as empty, which never equals
          # head_cff — the PR introduced it, so it takes the strict path.
          base_cff=$(git show "$BASE_SHA:CITATION.cff" 2>/dev/null | sed -nE 's/^version: (.*)$/\1/p' || true)

          if [ "$head_cff" = "$head_cli" ]; then
            echo "CITATION.cff is in step with cli/package.json ($head_cli)"
          elif [ "$base_cff" != "$head_cff" ]; then
            echo "::error file=CITATION.cff::this PR sets CITATION.cff's version to $head_cff, but cli/package.json is $head_cli. Run .github/citation/sync.sh and commit the result."
            exit 1
          else
            echo "::notice file=CITATION.cff::CITATION.cff ($head_cff) trails cli/package.json ($head_cli), inherited from the base branch — citation-sync.yml heals main after every bump push; dispatch it manually if this lingers."
          fi
