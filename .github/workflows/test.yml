name: Test

# Runs the unit suites of the independent subsystems. `cli/` and `harness/`
# are self-contained bun packages (each owns its bun.lock), so each is
# installed and tested in its own job. Both suites use bun:test.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: test (cli)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed to install the private @inflexa-ai/tsprov package from GitHub
      # Packages. The repo's GITHUB_TOKEN can read it ONLY if the tsprov package
      # grants this repo access (Package settings -> Manage Actions access).
      packages: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Authenticate to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # cli/.npmrc already points @inflexa-ai at npm.pkg.github.com; add the token.
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  harness:
    name: test (harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        # The DB/DBOS suites need a Postgres + DBOS testcontainer; they are
        # deferred until a Postgres service is wired into CI. Run every test file
        # that does NOT pull in the DB/DBOS test setup — selected dynamically so
        # new unit tests are included and new infra tests are excluded
        # automatically (grep -L = files that do not match).
        run: |
          unit=$(grep -rLE 'setup/postgres|setup/dbos|withSchema|getTestPool|withDbos|setupDbosForTests|CORTEX_TEST_PG_URL|testcontainers' src --include='*.test.ts')
          echo "Running $(echo "$unit" | wc -l) unit test files; DB/DBOS-dependent files deferred."
          bun test $unit
