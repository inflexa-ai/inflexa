name: Build Library Store

# Builds the shared library store (R / Python / Node / bioconda tools) from
# images/lib-store-builder/lib-store-manifest.yaml and publishes ONE
# content-addressed tarball PER TRACK plus a per-arch manifest to object
# storage; sandboxes mount the assembled result read-only at /mnt/libs.
#
# amd64 needs a large self-hosted runner (label `inflexa-builder`) — the full
# R + Bioconductor compile does not fit a GitHub-hosted runner. The three non-R
# tracks also build on the free hosted arm64 runner. To build the store on your
# own machine instead, use scripts/build-libs-local.sh.
#
# Gate 1 (fail-loud build-time load test) runs inside each track stage: a load
# failure fails that track's build. Per-track `continue-on-error` keeps a
# single track failure from sinking the whole run — the tarballs that did build
# are still uploaded (content-addressed, reusable), but an incomplete arch
# publishes no manifest and no candidate.
#
# Publish is OPT-IN via repo/org configuration; without it the workflow still
# builds but skips the S3 upload:
#   - vars.LIB_STORE_S3_BUCKET        target bucket
#   - vars.LIB_STORE_PUBLISH_ROLE_ARN OIDC role to assume for the upload
#   - vars.AWS_REGION                 optional; defaults to us-east-1
#
# PUBLISH MODEL (immutable versions, no latest promotion here): tarballs and
# the per-arch manifest land under <version>/linux-<arch>/; the candidate
# pointer marks the version awaiting Gate 2. `latest/<arch>` moves only after
# Gate 2 goes green — see .github/workflows/validate-lib-store.yml.

on:
  push:
    branches: [main]
    paths:
      - images/lib-store-builder/lib-store-manifest.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  BUILDER_NAME: lib-store-builder
  DOCKERFILE: images/lib-store-builder/Dockerfile
  CONTEXT: images/lib-store-builder
  MANIFEST: images/lib-store-builder/lib-store-manifest.yaml

jobs:
  # A single coherent version + shared manifest metadata for every arch.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      base_image: ${{ steps.meta.outputs.base_image }}
      r_version: ${{ steps.meta.outputs.r_version }}
      python_version: ${{ steps.meta.outputs.python_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute version + parse manifest
        id: meta
        run: |
          BASE_IMAGE=$(grep '^base_image:' "$MANIFEST" | awk '{print $2}' | tr -d '"')
          R_VERSION=$(grep '^r_version:' "$MANIFEST" | awk '{print $2}' | tr -d '"')
          PYTHON_VERSION=$(grep '^python_version:' "$MANIFEST" | awk '{print $2}' | tr -d '"')
          VERSION=$(date +%Y%m%d)-$(echo "${{ github.sha }}" | head -c 7)
          {
            echo "version=$VERSION"
            echo "base_image=$BASE_IMAGE"
            echo "r_version=$R_VERSION"
            echo "python_version=$PYTHON_VERSION"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64: self-hosted (all six tracks, including the R triple).
          - arch: amd64
            platform: linux/amd64
            runner: '["self-hosted", "inflexa-builder"]'
            build_r: true
          # arm64: hosted arm64 runner. No R compile (r2u is amd64-only;
          # bioconda aarch64 is patchy) — only the three non-R tracks.
          - arch: arm64
            platform: linux/arm64
            runner: '"ubuntu-24.04-arm"'
            build_r: false
    runs-on: ${{ fromJSON(matrix.runner) }}
    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}
      BASE_IMAGE: ${{ needs.prepare.outputs.base_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          name: ${{ env.BUILDER_NAME }}
          cleanup: false

      - name: Free disk space (hosted arm64 runner)
        if: matrix.arch == 'arm64'
        # Hosted runners have a fixed ~14 GB of usable disk and GitHub offers no
        # supported way to skip the preinstalled toolsets (the alternatives are
        # paid larger runners or self-hosting, like the amd64 leg). The conda +
        # python images plus staging need most of that 14 GB, so drop the
        # biggest toolsets we never use.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          df -h /

      - name: Recover stale builder state
        if: matrix.arch == 'amd64'
        # cleanup:false reuses the BuildKit container across runs on the
        # persistent self-hosted builder. A cancelled prior run can leave
        # orphaned sub-container network state behind — every subsequent build
        # then sees "Connection refused" against public mirrors. Probe egress;
        # recreate the builder only if broken.
        run: |
          set -eu
          PROBE=$(mktemp -d) && trap 'rm -rf "$PROBE"' EXIT
          cat > "$PROBE/Dockerfile" <<'EOF'
          FROM alpine:3
          RUN wget -q --spider --timeout=15 http://archive.ubuntu.com/ubuntu/dists/noble/InRelease
          EOF
          if ! docker buildx build --builder "$BUILDER_NAME" --platform "$PLATFORM" --no-cache "$PROBE" >/tmp/probe.log 2>&1; then
            echo "::warning::Builder $BUILDER_NAME failed egress probe; recreating to clear stale state"
            sed 's/^/probe: /' /tmp/probe.log || true
            docker buildx rm --force "$BUILDER_NAME" || true
            docker buildx create --driver docker-container --name "$BUILDER_NAME" --bootstrap >/dev/null
          fi

      - name: Ensure zstd
        run: command -v zstd >/dev/null || sudo apt-get install -y -qq zstd

      - name: Warm base stage cache
        run: |
          docker buildx build \
            --file "$DOCKERFILE" \
            --build-arg "BASE_IMAGE=$BASE_IMAGE" \
            --platform "$PLATFORM" \
            --target base \
            --builder "$BUILDER_NAME" \
            "$CONTEXT"

      # R triple (amd64 only): CRAN (binary .deb) -> Bioconductor (source) ->
      # GitHub. Sequential because they share one .libPaths() dependency chain.

      - name: "Build: CRAN"
        id: cran
        if: matrix.build_r
        continue-on-error: true
        run: scripts/lib-store-build-track.sh cran

      - name: "Build: Bioconductor"
        id: bioc
        if: matrix.build_r && steps.cran.outcome == 'success'
        continue-on-error: true
        run: scripts/lib-store-build-track.sh bioconductor

      - name: "Build: GitHub R packages"
        id: github
        if: matrix.build_r && steps.bioc.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/lib-store-build-track.sh github

      # Non-R tracks (both arches).

      - name: "Build: Python"
        id: python
        continue-on-error: true
        run: scripts/lib-store-build-track.sh python

      - name: "Build: System tools"
        id: conda
        continue-on-error: true
        run: scripts/lib-store-build-track.sh conda

      - name: "Build: Node"
        id: node
        continue-on-error: true
        run: scripts/lib-store-build-track.sh node

      - name: Pack per-track tarballs
        id: pack
        run: |
          bash scripts/lib-store-pack.sh staging dist
          {
            echo "## Build Results ($ARCH)"
            echo "| Track | Status |"
            echo "|-|-|"
            echo "| CRAN | ${{ steps.cran.outcome }} |"
            echo "| Bioconductor | ${{ steps.bioc.outcome }} |"
            echo "| GitHub R | ${{ steps.github.outcome }} |"
            echo "| Python | ${{ steps.python.outcome }} |"
            echo "| System tools | ${{ steps.conda.outcome }} |"
            echo "| Node | ${{ steps.node.outcome }} |"
            echo "Packed tracks: $(tr '\n' ' ' < dist/tracks.txt)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish configuration
        id: publish
        run: |
          if [ -n "${{ vars.LIB_STORE_S3_BUCKET }}" ] && [ -n "${{ vars.LIB_STORE_PUBLISH_ROLE_ARN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Publish skipped — set repo variables LIB_STORE_S3_BUCKET and LIB_STORE_PUBLISH_ROLE_ARN to enable S3 upload. Per-track tarballs were produced but not published."
          fi

      - name: Configure AWS credentials
        if: steps.publish.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.LIB_STORE_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Publish track tarballs + candidate manifest
        if: steps.publish.outputs.enabled == 'true'
        env:
          S3_BUCKET: ${{ vars.LIB_STORE_S3_BUCKET }}
          # The public base URL the CLI fetches from (embedded into manifest
          # track URLs). Defaults to the CLI's compiled default.
          PUBLIC_URL: ${{ vars.LIB_STORE_PUBLIC_URL || 'https://lib-store.inflexa.ai' }}
          R_VERSION: ${{ needs.prepare.outputs.r_version }}
          PYTHON_VERSION: ${{ needs.prepare.outputs.python_version }}
          GIT_SHA: ${{ github.sha }}
        run: scripts/lib-store-publish.sh "$ARCH" "${{ needs.prepare.outputs.version }}" dist

      - name: Record candidate metadata
        run: |
          mkdir -p candidate
          cat > "candidate/linux-${ARCH}.json" <<EOF
          {"version":"${{ needs.prepare.outputs.version }}","arch":"linux-${ARCH}","publish":"${{ steps.publish.outputs.enabled }}"}
          EOF
          cat "candidate/linux-${ARCH}.json"

      - name: Upload candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-store-candidate-${{ matrix.arch }}
          path: candidate/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker rmi lib-store-cran lib-store-bioconductor lib-store-github lib-store-python lib-store-conda lib-store-node 2>/dev/null || true
          rm -rf staging dist candidate
          docker image prune -f 2>/dev/null || true
          docker container prune -f 2>/dev/null || true
