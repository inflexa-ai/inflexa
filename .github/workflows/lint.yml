name: Lint

# Lints/typechecks the independent subsystems. `cli/` has ESLint + a tsc
# typecheck; `harness/` has no ESLint config, so its lint is the tsc typecheck.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: lint (cli)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # See test.yml: needed to install the private @inflexa-ai/tsprov package.
      packages: read
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Authenticate to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

      # cli depends on @inflexa-ai/harness via file:../harness, whose exports
      # resolve to harness/dist/ — not checked in, and bun blocks the package's
      # own `prepare` (untrusted lifecycle scripts), so build it explicitly.
      - name: Build harness (file:../harness dependency)
        working-directory: harness
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  harness:
    name: lint (harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc -p tsconfig.json --noEmit
