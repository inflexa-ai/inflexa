name: Test

# Runs the unit suites of the independent subsystems. `cli/` and `harness/`
# are self-contained bun packages (each owns its bun.lock), so each is
# installed and tested in its own job. Both suites use bun:test.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: test (cli)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # cli pins @inflexa-ai/harness to an exact version and installs it from
      # npm (not file:../harness), so a plain install resolves it — no in-repo
      # harness build. A cli change that needs an unreleased harness must land
      # AFTER that harness version publishes (release-harness.yml); until then
      # this frozen install cannot resolve the pin. See the two-step promotion.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  harness:
    name: test (harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        # The DB/DBOS suites need a Postgres + DBOS testcontainer; they are
        # deferred until a Postgres service is wired into CI. Run every test file
        # that does NOT pull in the DB/DBOS test setup — selected dynamically so
        # new unit tests are included and new infra tests are excluded
        # automatically (grep -L = files that do not match).
        run: |
          unit=$(grep -rLE 'setup/postgres|setup/dbos|withSchema|getTestPool|withDbos|setupDbosForTests|CORTEX_TEST_PG_URL|testcontainers' src --include='*.test.ts')
          echo "Running $(echo "$unit" | wc -l) unit test files; DB/DBOS-dependent files deferred."
          bun test $unit
