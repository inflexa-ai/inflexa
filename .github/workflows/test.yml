name: Test

# Runs the unit suites of the independent subsystems. `cli/` and `harness/`
# are self-contained bun packages (each owns its bun.lock), so each is
# installed and tested on its own via the matrix below. Both suites use
# bun:test and run with `bun test`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.subsystem }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        subsystem: [cli, harness]
    defaults:
      run:
        working-directory: ${{ matrix.subsystem }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test
