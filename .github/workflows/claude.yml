name: Claude Code

# On-demand Claude. Mention `@claude` in a PR/issue comment, a PR review, or an
# issue body/title and Claude runs against that context (reviews the diff,
# answers a question, drafts a fix). It does nothing unless invoked, so it costs
# nothing on ordinary pushes.
#
# NOTE: Claude posts as `github-actions[bot]`. A bot review does NOT count toward
# a required human approval — this complements branch protection, it never
# bypasses it.
#
# Requires a `CLAUDE_CODE_OAUTH_TOKEN` repo secret. Generate it with
# `claude setup-token` (uses a Claude Pro/Max subscription), or run
# `/install-github-app` which sets it up for you
# (Settings -> Secrets and variables -> Actions).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions: {}

jobs:
  claude:
    # Run only when someone mentions @claude AND that someone is one of us:
    # an org OWNER/MEMBER or a repo COLLABORATOR. author_association reflects the
    # actor's relationship to THIS repo, so outside contributors (CONTRIBUTOR,
    # NONE, etc.) cannot trigger a billed Claude run.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so Claude can diff the PR's whole commit range.
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@44423bdec74b97d67543eb16c110546762c110b2 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # NOTE: do NOT set `prompt:` here. Providing `prompt` forces the
          # action into "agent" (headless automation) mode, which runs the
          # model but posts nothing back to the PR. For on-demand @claude
          # mentions we want "tag" mode, which is selected precisely by the
          # ABSENCE of `prompt` — it reads the triggering comment and posts a
          # real review. Repo guidance is injected via --append-system-prompt.
          #
          # This repo is an independent-subsystem monorepo (cli/, harness/, ...).
          # Review each changed subsystem against its own CLAUDE.md conventions.
          claude_args: |
            --append-system-prompt "This is the inflexa-ai/inflexa monorepo of independent subsystems (cli/, harness/, skills/, templates/, images/). Each subsystem is self-contained with its own CLAUDE.md — review changed code against the conventions of the subsystem it lives in. Focus on correctness bugs, security issues, and missing tests; skip style nits."
