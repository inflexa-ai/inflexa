name: Test

# Runs the unit suites of the independent subsystems. `cli/` and `harness/`
# are self-contained bun packages (each owns its bun.lock), so each is
# installed and tested in its own job. Both suites use bun:test.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: test (cli)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      # cli depends on @inflexa-ai/harness via file:../harness, whose exports
      # resolve to harness/dist/ — not checked in, and bun blocks the package's
      # own `prepare` (untrusted lifecycle scripts), so build it explicitly.
      - name: Build harness (file:../harness dependency)
        working-directory: harness
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  harness:
    name: test (harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        # The DB/DBOS suites need a Postgres + DBOS testcontainer; they are
        # deferred until a Postgres service is wired into CI. Run every test file
        # that does NOT pull in the DB/DBOS test setup — selected dynamically so
        # new unit tests are included and new infra tests are excluded
        # automatically (grep -L = files that do not match).
        run: |
          unit=$(grep -rLE 'setup/postgres|setup/dbos|withSchema|getTestPool|withDbos|setupDbosForTests|CORTEX_TEST_PG_URL|testcontainers' src --include='*.test.ts')
          echo "Running $(echo "$unit" | wc -l) unit test files; DB/DBOS-dependent files deferred."
          bun test $unit
