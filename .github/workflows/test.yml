name: Test

# Runs the unit suites of the independent subsystems. `cli/` and `harness/`
# are self-contained bun packages (each owns its bun.lock), so each is
# installed and tested in its own job. Both suites use bun:test.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: test (cli)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # cli pins @inflexa-ai/harness to an exact version and installs it from
      # npm (not file:../harness), so a plain install resolves it — no in-repo
      # harness build. A cli change that needs an unreleased harness must land
      # AFTER that harness version publishes (release-harness.yml); until then
      # this frozen install cannot resolve the pin. See the two-step promotion.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  harness:
    name: test (harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness

    # Shared pgvector Postgres for the DB/DBOS suites. The test setup picks it
    # up via `CORTEX_TEST_PG_URL` (src/__tests__/setup/postgres.ts) and skips
    # testcontainers entirely — one server serves every test file, and DBOS
    # reuses the same database (its tables live in a `dbos` schema). This is
    # what lets the harness job run the full suite instead of a grep-selected
    # subset.
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: cortex
          POSTGRES_PASSWORD: cortex
          POSTGRES_DB: cortex
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cortex -d cortex"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=20

    env:
      # Point `withSchema`/`withDbos` at the service container above.
      CORTEX_TEST_PG_URL: postgres://cortex:cortex@localhost:5432/cortex

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test
