name: Validate Library Store

# Gate 2 — the after-build, "as a user" validation gate (see design.md). It runs
# on a FRESH machine with none of the builder's affordances: it pulls the
# just-published candidate store the way an end user does (the real
# `inflexa libs pull` handler, anonymous HTTP), mounts it read-only in
# sandbox-base, and runs the extensive suite (scripts/lib-store-validate). Only
# a GREEN run promotes the candidate manifest to latest/linux-<arch>; a RED run
# leaves latest untouched and fails.
#
# Cross-subsystem dependency (design.md #1): the pull path is the cli deliverable
# `inflexa libs pull` (cli/src/modules/libs). This workflow builds and invokes
# that real handler — the same dogfooded code path the interactive setup flow
# uses — rather than a validator-private download.
#
# Requires the same opt-in publish config as the build (LIB_STORE_S3_BUCKET,
# LIB_STORE_PUBLISH_ROLE_ARN, optional LIB_STORE_PUBLIC_URL); without it there is
# nothing published to validate and the run no-ops.

on:
  workflow_run:
    workflows: ["Build Library Store"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  actions: read
  packages: read

jobs:
  validate:
    # Only when the build succeeded (a fully-failed build has nothing to check).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64: self-hosted so it can build + run sandbox-base and mount the
          # full R store.
          - arch: amd64
            runner: '["self-hosted", "inflexa-builder"]'
          - arch: arm64
            runner: '"ubuntu-24.04-arm"'
    runs-on: ${{ fromJSON(matrix.runner) }}
    env:
      ARCH: ${{ matrix.arch }}
      S3_BUCKET: ${{ vars.LIB_STORE_S3_BUCKET }}
      INFLEXA_LIB_STORE_URL: ${{ vars.LIB_STORE_PUBLIC_URL || 'https://lib-store.inflexa.ai' }}
      SANDBOX_BASE_IMAGE: sandbox-base:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pin to the commit that produced the candidate build: this workflow runs the real
          # `inflexa libs pull` handler + validation suite from the checked-out tree, so an
          # unpinned checkout would validate against a DIFFERENT handler if main advanced.
          # `head_sha` is empty on workflow_dispatch → checkout falls back to the dispatched ref.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Gate publish configuration
        id: cfg
        run: |
          if [ -n "$S3_BUCKET" ] && [ -n "${{ vars.LIB_STORE_PUBLISH_ROLE_ARN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Validation skipped — LIB_STORE_S3_BUCKET / LIB_STORE_PUBLISH_ROLE_ARN unset, so nothing was published to validate."
          fi

      # AWS credentials are configured BEFORE resolving the candidate: the
      # workflow_dispatch path reads the candidate pointer from S3, so the creds must
      # exist first. It also serves the later promotion (`aws s3 cp` on green). Gated on
      # the publish config, not the candidate — the candidate is not resolved yet.
      - name: Configure AWS credentials
        if: steps.cfg.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.LIB_STORE_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Download candidate metadata (from the build run)
        if: steps.cfg.outputs.enabled == 'true' && github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: lib-store-candidate-${{ matrix.arch }}
          path: candidate
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve candidate version
        id: candidate
        if: steps.cfg.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          if [ -f "candidate/linux-${ARCH}.json" ]; then
            VERSION=$(python3 -c "import json;print(json.load(open('candidate/linux-${ARCH}.json'))['version'])")
            PUBLISHED=$(python3 -c "import json;print(json.load(open('candidate/linux-${ARCH}.json')).get('publish',''))")
          else
            # workflow_dispatch fallback: read the recorded candidate pointer. Credentials
            # are already configured (step above), so a failure here is REAL — distinguish a
            # genuinely-absent pointer object (clean no-op) from any transport/permission
            # failure (fail the job) rather than blanket-`|| true`-ing every error to green.
            PUBLISHED=true
            if aws s3 cp "s3://$S3_BUCKET/candidate/linux-${ARCH}.txt" candidate.txt 2>aws-err.log; then
              VERSION=$(cat candidate.txt)
            elif grep -Eqi 'Not Found|404|NoSuchKey|does not exist' aws-err.log; then
              echo "::notice::No candidate pointer object for linux-${ARCH}; nothing to validate."
              VERSION=""
            else
              echo "::error::Failed to read the candidate pointer for linux-${ARCH}:"
              cat aws-err.log >&2
              exit 1
            fi
          fi
          if [ -z "$VERSION" ] || [ "$PUBLISHED" != "true" ]; then
            echo "::notice::No published candidate for linux-${ARCH}; nothing to validate."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Candidate for linux-${ARCH}: $VERSION"
          fi

      # --- build the real CLI pull handler (dogfooded pull path) -------------

      - name: Set up Bun
        if: steps.candidate.outputs.present == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Authenticate to GitHub Packages
        if: steps.candidate.outputs.present == 'true'
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Build harness (cli's file:../harness dependency)
        if: steps.candidate.outputs.present == 'true'
        working-directory: harness
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install CLI
        if: steps.candidate.outputs.present == 'true'
        working-directory: cli
        run: bun install --frozen-lockfile

      # --- ensure a sandbox-base image to mount the store into ---------------

      - name: Prepare sandbox-base image
        if: steps.candidate.outputs.present == 'true'
        run: |
          set -euo pipefail
          if [ -n "${{ vars.SANDBOX_BASE_IMAGE }}" ]; then
            docker pull "${{ vars.SANDBOX_BASE_IMAGE }}"
            docker tag "${{ vars.SANDBOX_BASE_IMAGE }}" sandbox-base:latest
          elif ! docker image inspect sandbox-base:latest >/dev/null 2>&1; then
            # Context is the repo ROOT (with -f) — the Dockerfile's COPY sources are
            # repo-root-relative (images/sandbox-base/server, images/sandbox-base/provenance),
            # so a context of images/sandbox-base can't resolve them.
            docker build --platform "linux/${ARCH}" -f images/sandbox-base/Dockerfile -t sandbox-base:latest .
          fi

      # --- Gate 2: pull as a user, mount, run the suite, promote on green ----

      - name: Pull, validate, and promote
        if: steps.candidate.outputs.present == 'true'
        run: |
          if scripts/lib-store-gate2.sh "$ARCH" "${{ steps.candidate.outputs.version }}"; then
            echo "| linux-$ARCH | GREEN → promoted |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| linux-$ARCH | RED → latest unchanged |" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: rm -rf "${XDG_DATA_HOME:-$HOME/.local/share}/inflexa/libs" candidate 2>/dev/null || true
