name: Lint

# Lints/typechecks the independent subsystems. `cli/` has ESLint + a tsc
# typecheck; `harness/` has no ESLint config, so its lint is the tsc typecheck.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: lint (cli)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # cli pins @inflexa-ai/harness to an exact version and installs it from
      # npm (not file:../harness), so a plain install resolves it — no in-repo
      # harness build. A cli change that needs an unreleased harness must land
      # AFTER that harness version publishes (release-harness.yml); until then
      # this frozen install cannot resolve the pin. See the two-step promotion.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  harness:
    name: lint (harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc -p tsconfig.json --noEmit
